<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sitio en Construcción</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @font-face {
      font-family: 'SugoPro';
      src: url('Sugo pro display/Sugo-Pro-Display-Bold-trial.ttf') format('truetype');
      font-weight: 700;
    }
    @font-face {
      font-family: 'SugoPro';
      src: url('Sugo pro display/Sugo-Pro-Display-Light-trial.ttf') format('truetype');
      font-weight: 300;
    }
    @font-face {
      font-family: 'BDSans';
      src: url('Beautiful delicious Font/BDSans-Regular.otf') format('opentype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'BDSans';
      src: url('Beautiful delicious Font/BDSans-Bold.otf') format('opentype');
      font-weight: 700;
    }
  </style>
  <style>
    :root {
      --blue-dark: #0a1628;
      --blue-mid: #0d2147;
      --blue-line: #1e4a8a;
      --blue-bright: #2563c7;
      --cyan: #38bdf8;
      --white-line: rgba(100, 180, 255, 0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--blue-dark);
      font-family: 'BDSans', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Blueprint grid background */
    .blueprint-bg {
      position: fixed;
      inset: 0;
      background-color: #0b1e3d;
      background-image:
        linear-gradient(var(--white-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--white-line) 1px, transparent 1px),
        linear-gradient(rgba(100, 180, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 180, 255, 0.06) 1px, transparent 1px);
      background-size: 80px 80px, 80px 80px, 20px 20px, 20px 20px;
      z-index: 0;
    }

    /* Radial glow in center */
    .glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(37, 99, 199, 0.22) 0%, transparent 70%);
      z-index: 1;
      pointer-events: none;
    }

    /* Logo top center */
    .logo-corner {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      pointer-events: none;
    }
    .logo-corner img {
      width: clamp(70px, 12vw, 110px);
      height: clamp(70px, 12vw, 110px);
      object-fit: contain;
      opacity: 0.85;
      filter: brightness(1.1);
      border-radius: 8px;
    }

    /* Grain texture */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    .content {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      gap: 0;
    }

    .crane-container {
      max-height: 38vh;
      overflow: hidden;
    }

    /* Blueprint label corners */
    .corner-label {
      position: fixed;
      font-family: 'BDSans', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: rgba(100, 180, 255, 0.35);
      z-index: 5;
    }
    .corner-label.tl { top: 1.5rem; left: 1.5rem; }
    .corner-label.tr { top: 1.5rem; right: 1.5rem; }
    .corner-label.bl { bottom: 1.5rem; left: 1.5rem; }
    .corner-label.br { bottom: 1.5rem; right: 1.5rem; }

    /* Border frame */
    .frame-border {
      position: fixed;
      inset: 1rem;
      border: 1px solid rgba(100, 180, 255, 0.2);
      z-index: 5;
      pointer-events: none;
    }
    .frame-border::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(100, 180, 255, 0.08);
    }

    /* Crane SVG */
    .crane-container {
      position: relative;
      width: 100%;
      max-width: 700px;
      display: flex;
      justify-content: center;
    }

    /* Crane arm animation */
    @keyframes sway {
      0%, 100% { transform: rotate(-1deg); }
      50%       { transform: rotate(1deg); }
    }
    @keyframes hang {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(6px); }
    }
    @keyframes blink {
      0%, 90%, 100% { opacity: 1; }
      95%            { opacity: 0.2; }
    }

    .crane-arm { transform-origin: 70px 120px; animation: sway 4s ease-in-out infinite; }
    .crane-hook { animation: hang 4s ease-in-out infinite; }
    .crane-light { animation: blink 3s ease-in-out infinite; }

    /* Text styles */
    .main-title {
      font-family: 'SugoPro', sans-serif;
      font-size: clamp(2.8rem, 8vw, 6.5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.05;
      color: #e8f4ff;
      text-shadow:
        0 0 30px rgba(56, 189, 248, 0.5),
        0 0 60px rgba(37, 99, 199, 0.3);
    }

    .sub-title {
      font-family: 'BDSans', sans-serif;
      font-weight: 700;
      font-size: clamp(0.9rem, 2vw, 1.25rem);
      letter-spacing: 0.35em;
      color: var(--cyan);
      opacity: 0.75;
      text-transform: uppercase;
    }

    .body-text {
      font-family: 'BDSans', sans-serif;
      font-size: 1.2rem;
      line-height: 1.7;
      color: rgba(180, 215, 255, 0.65);
      max-width: 480px;
      text-align: center;
    }

    /* Progress bar */
    .progress-track {
      width: 100%;
      max-width: 360px;
      height: 4px;
      background: rgba(56, 189, 248, 0.15);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 62%;
      background: linear-gradient(90deg, #1e4a8a, #38bdf8);
      border-radius: 2px;
      position: relative;
      animation: none;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 40px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6));
      border-radius: 2px;
    }
    .progress-label {
      font-family: 'BDSans', sans-serif;
      font-weight: 700;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: rgba(56, 189, 248, 0.6);
    }

    /* Measurement lines (blueprint style) */
    .measure-line {
      position: absolute;
      background: rgba(100, 180, 255, 0.25);
      pointer-events: none;
    }
    .measure-h { height: 1px; width: 100px; }
    .measure-v { width: 1px; height: 60px; }
    .measure-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(56, 189, 248, 0.5);
      position: absolute;
    }
  </style>
</head>
<body>

  <!-- Blueprint background layers -->
  <div class="blueprint-bg"></div>
  <div class="glow"></div>
  <div class="logo-corner">
    <img src="AC-TUCASA-01 a.jpg" alt="AC Tu Casa" />
  </div>
  <div class="grain"></div>
  <div class="frame-border"></div>

  <!-- Corner labels -->
  <div class="corner-label tl">PLANO A-01 / REV.3</div>

  <div class="corner-label bl">© 2026 — TODOS LOS DERECHOS RESERVADOS</div>
  <div class="corner-label br">HOJA 1 DE 1</div>

  <main class="content">

    <!-- Crane SVG illustration (blueprint style) -->
    <div class="crane-container mb-8">
      <svg viewBox="0 0 700 320" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%; max-width:700px;">

        <!-- Measurement annotations -->
        <line x1="40" y1="20" x2="40" y2="280" stroke="rgba(100,180,255,0.2)" stroke-width="0.5" stroke-dasharray="4 4"/>

        <!-- Tick marks -->

        <g class="crane-arm">

          <rect x="68" y="200" width="24" height="60" fill="none" stroke="#2e6fc7" stroke-width="1.5"/>
          <!-- Tower cross braces -->

          <line x1="92" y1="200" x2="68" y2="230" stroke="#2e6fc7" stroke-width="0.8"/>

          <!-- Cable from peak to counter-jib -->

          <!-- Counterweight -->
          <rect x="22" y="203" width="16" height="10" fill="none" stroke="#38bdf8" stroke-width="1.2"/>
          <!-- Warning light -->
          <circle cx="80" cy="152" r="3" fill="#38bdf8" opacity="0.9" class="crane-light"/>
        </g>

        <!-- Hanging hook crane 1 -->
        <g class="crane-hook">
          <line x1="200" y1="183" x2="200" y2="230" stroke="rgba(56,189,248,0.6)" stroke-width="0.8"/>
          <!-- Hook shape -->
          <path d="M197 230 Q197 240 205 240 Q213 240 213 232" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
          <!-- Load block -->
          <rect x="193" y="218" width="14" height="10" fill="none" stroke="#2e6fc7" stroke-width="1"/>
          <!-- Pulley -->
          <circle cx="200" cy="215" r="4" fill="none" stroke="#38bdf8" stroke-width="1"/>
          <!-- Hanging load (box) -->
          <rect x="185" y="242" width="30" height="20" fill="none" stroke="#38bdf8" stroke-width="1.2"/>
          <line x1="185" y1="242" x2="215" y2="262" stroke="rgba(56,189,248,0.3)" stroke-width="0.6"/>
          <line x1="215" y1="242" x2="185" y2="262" stroke="rgba(56,189,248,0.3)" stroke-width="0.6"/>
          <line x1="185" y1="242" x2="200" y2="218" stroke="rgba(56,189,248,0.5)" stroke-width="0.8"/>
          <line x1="215" y1="242" x2="200" y2="218" stroke="rgba(56,189,248,0.5)" stroke-width="0.8"/>

        <!-- ===================== CRANE 2 (right, smaller) ===================== -->
        <g>
          <!-- Tower base -->
          <rect x="540" y="210" width="20" height="50" fill="none" stroke="#2e6fc7" stroke-width="1.2"/>
          <!-- Tower cross braces -->
          <line x1="540" y1="210" x2="560" y2="235" stroke="#2e6fc7" stroke-width="0.7"/>
          <line x1="560" y1="210" x2="540" y2="235" stroke="#2e6fc7" stroke-width="0.7"/>
          <line x1="540" y1="235" x2="560" y2="260" stroke="#2e6fc7" stroke-width="0.7"/>
          <line x1="560" y1="235" x2="540" y2="260" stroke="#2e6fc7" stroke-width="0.7"/>
          <!-- Tower top cap -->
          <rect x="536" y="205" width="28" height="6" fill="none" stroke="#38bdf8" stroke-width="1"/>
          <!-- Horizontal jib -->
          <line x1="550" y1="208" x2="660" y2="195" stroke="#38bdf8" stroke-width="1.8"/>
          <!-- Counter-jib -->

          <line x1="550" y1="176" x2="510" y2="213" stroke="rgba(56,189,248,0.3)" stroke-width="0.7" stroke-dasharray="3 3"/>
          <!-- Counterweight -->
          <rect x="504" y="211" width="12" height="8" fill="none" stroke="#38bdf8" stroke-width="1"/>
          <!-- Warning light -->
          <circle cx="550" cy="168" r="2.5" fill="#38bdf8" opacity="0.9" class="crane-light" style="animation-delay:1.5s"/>

        <line x1="442" y1="188" x2="442" y2="220" stroke="#2e6fc7" stroke-width="1.2"/>
        <!-- Windows floor 2 -->

        <rect x="402" y="194" width="18" height="12" fill="none" stroke="rgba(56,189,248,0.5)" stroke-width="0.8"/>
        <!-- Floor 3 (in progress - scaffolding style) -->
        <line x1="346" y1="156" x2="346" y2="188" stroke="rgba(56,189,248,0.4)" stroke-width="1" stroke-dasharray="3 2"/>
        <line x1="390" y1="156" x2="390" y2="188" stroke="rgba(56,189,248,0.4)" stroke-width="1" stroke-dasharray="3 2"/>

        <!-- Dimension annotations -->

        <line x1="300" y1="136" x2="300" y2="145" stroke="rgba(100,180,255,0.35)" stroke-width="0.8"/>

        <line x1="640" y1="265" x2="650" y2="275" stroke="rgba(100,180,255,0.2)" stroke-width="0.7"/>
      </svg>
    </div>
